# DarkLab Services — Docker Compose overlay
#
# Adds OpenViking (memory), AIClient-2-API (boost tier) to the Leader stack.
#
# Usage:
#   cd ~/darklab
#   docker compose -f docker-compose.yml \
#     -f darklab-installer/docker/docker-compose.leader.yml \
#     -f darklab-installer/docker/docker-compose.services.yml \
#     up -d
#
# Or merge services into ~/darklab/docker-compose.yml directly.

services:

  # ── OpenViking (Agent Memory Server) ──────────────────────────────────
  # Context database for persistent agent memory with tiered retrieval.
  # Port 1933 — REST API for read/write/search operations.
  openviking:
    image: ghcr.io/volcengine/openviking:main
    restart: unless-stopped
    ports:
      - "1933:1933"
    volumes:
      - openviking-data:/app/data
      - ${OPENVIKING_CONF:-./configs/openviking.conf}:/app/ov.conf:ro
    environment:
      OV_DATA_DIR: /app/data
    networks:
      - darklab
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:1933/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── AIClient-2-API (Boost Tier Proxy) ─────────────────────────────────
  # Converts free client OAuth accounts (Gemini CLI, Kiro, Codex) into
  # an OpenAI-compatible endpoint. Zero API cost.
  # Port 3456 — OpenAI-compatible /v1/chat/completions
  aiclient-api:
    image: justlikemaki/aiclient-2-api:latest
    restart: unless-stopped
    ports:
      - "3456:3000"
    volumes:
      - ${AICLIENT_CONFIGS:-./configs/aiclient}:/app/configs
    environment:
      REQUIRED_API_KEY: ${AICLIENT_API_KEY:-darklab-internal}
      NODE_ENV: production
    networks:
      - darklab
    healthcheck:
      test: ["CMD", "curl", "-fsS", "-H", "Authorization: Bearer ${AICLIENT_API_KEY:-darklab-internal}", "http://127.0.0.1:3000/v1/models"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── DeerFlow Gateway (Optional — for standalone deployment) ───────────
  # REST API for DeerFlow models, skills, memory, and uploads.
  # Only needed when running DeerFlow as a separate service rather than
  # embedded in the OAS Python process. See docs/DEERFLOW-INTEGRATION-PLAN.md.
  # Port 8001 — FastAPI Gateway
  # Port 2024 — LangGraph agent runtime
  deerflow-gateway:
    build:
      context: ../../frameworks/deer-flow-main/backend
      dockerfile: Dockerfile
    command: ["python", "-m", "uvicorn", "app.gateway.app:app", "--host", "0.0.0.0", "--port", "8001"]
    restart: unless-stopped
    ports:
      - "8001:8001"
    volumes:
      - ${DEERFLOW_CONFIG:-~/.darklab/deerflow/config.yaml}:/app/config.yaml:ro
      - ${DEERFLOW_EXTENSIONS:-~/.darklab/deerflow/extensions_config.json}:/app/extensions_config.json
      - ${DEERFLOW_MEMORY:-~/.darklab/deerflow/memory.json}:/app/.deer-flow/memory.json
      - ../../frameworks/deer-flow-main/skills:/app/skills:ro
    environment:
      DEER_FLOW_CONFIG_PATH: /app/config.yaml
      DEER_FLOW_EXTENSIONS_CONFIG_PATH: /app/extensions_config.json
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      AICLIENT_API_KEY: ${AICLIENT_API_KEY:-darklab-internal}
    networks:
      - darklab
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - deerflow  # Only starts with: docker compose --profile deerflow up

  # ── MiroShark (Debate Simulation Engine) ──────────────────────────────
  # Multi-agent simulation for synthetic RL training debates.
  # Port 5001 — REST API for simulation CRUD and transcript extraction.
  # Requires Neo4j for knowledge graph storage.
  miroshark:
    build:
      context: ../../frameworks/MiroShark-main
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      LLM_BASE_URL: http://litellm:4000/v1
      LLM_API_KEY: ${LITELLM_API_KEY:-ollama}
      LLM_MODEL_NAME: llama3.1
      NEO4J_URI: bolt://neo4j-miroshark:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-miroshark}
      EMBEDDING_PROVIDER: ollama
      EMBEDDING_MODEL: nomic-embed-text
      EMBEDDING_BASE_URL: http://host.docker.internal:11434
      EMBEDDING_DIMENSIONS: "768"
    depends_on:
      - neo4j-miroshark
    networks:
      - darklab
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - miroshark  # Only starts with: docker compose --profile miroshark up

  # ── Neo4j (MiroShark Knowledge Graph) ──────────────────────────────
  neo4j-miroshark:
    image: neo4j:5.15-community
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-miroshark}
    volumes:
      - neo4j-miroshark-data:/data
    networks:
      - darklab
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:7474"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    profiles:
      - miroshark

volumes:
  openviking-data:
  neo4j-miroshark-data:

networks:
  darklab:
    external: true
